name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Build & Deploy to Oracle VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Build Go Backend
        working-directory: backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o server ./cmd/api

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: "unspecified"

      - name: Upload Binary and Restart Service
        run: |
          # 1. Add VM IP to known hosts
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

          # 2. Upload compiled binary to VM as a temp file
          scp backend/server ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/ubuntu/server.tmp

          # 3. SSH into VM, setup systemd if missing, replace the binary, and restart service
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            # Create systemd service file if it doesn't exist
            if [ ! -f /etc/systemd/system/fayde-backend.service ]; then
              echo "Creating systemd service file..."
              sudo tee /etc/systemd/system/fayde-backend.service > /dev/null << 'SERVICE'
[Unit]
Description=Fayde Go Backend Service
After=network.target

[Service]
Type=simple
User=ubuntu
WorkingDirectory=/home/ubuntu
EnvironmentFile=/home/ubuntu/fayde-backend.env
ExecStart=/home/ubuntu/server
Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target
SERVICE
              sudo systemctl daemon-reload
              sudo systemctl enable fayde-backend
            fi

            echo "Stopping fayde-backend..."
            sudo systemctl stop fayde-backend || true

            echo "Swapping new binary..."
            mv /home/ubuntu/server.tmp /home/ubuntu/server
            chmod +x /home/ubuntu/server

            echo "Restarting service..."
            sudo systemctl start fayde-backend
            
            echo "Deployment finished! Service status:"
            sudo systemctl status fayde-backend --no-pager | head -n 10
          EOF
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

